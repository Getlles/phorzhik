version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: photo_editor_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: photo_editor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: photo_editor_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/photo_editor
    depends_on:
      - db
    volumes:
      - uploads_data:/app/static/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: photo_editor_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads_data: